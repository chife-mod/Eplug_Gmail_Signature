<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>EPlug Signature V2</title>
</head>

<body style="margin:0;padding:40px;background:#f5f5f5;">

    <!--
  Gmail Email Signature — EPlug V2 (EPlug + Energy Plus)

  INSTALL: Open in Chrome → select the signature block → Cmd+C → Gmail Settings → Signature → Cmd+V → Save

  Email-safe table layout, inline CSS, hosted PNG logos/icons, max-width 520px.
-->

    <!-- EMAIL SIGNATURE START -->
    <table cellpadding="0" cellspacing="0" border="0" role="presentation"
        style="border-collapse:collapse;width:100%;max-width:520px;font-family:Arial,Helvetica,sans-serif;">
        <tr>
            <!-- LEFT: Name + Contacts on pink background -->
            <td valign="top" bgcolor="#FF00C5"
                style="background-color:#FF00C5;padding:24px;vertical-align:top;">
                <!-- Name + Job -->
                <table cellpadding="0" cellspacing="0" border="0" role="presentation"
                    style="border-collapse:collapse;">
                    <tr>
                        <td
                            style="font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:bold;color:#FFFFFF;line-height:24px;padding:0 0 4px 0;">
                            Michael Elhav
                        </td>
                    </tr>
                    <tr>
                        <td
                            style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#FFFFFF;line-height:18px;padding:0 0 16px 0;">
                            Head of EV<br>
                            EPlug &bull; Energy Plus
                        </td>
                    </tr>
                </table>
                <!-- Contact rows -->
                <table cellpadding="0" cellspacing="0" border="0" role="presentation"
                    style="border-collapse:collapse;">
                    <tr>
                        <td width="18" style="padding:1px 8px 1px 0;vertical-align:middle;">
                            <img src="https://chife-mod.github.io/Eplug_Gmail_Signature/public/assets/images/icon-phone.png"
                                alt="" width="18" height="18"
                                style="display:block;border:0;outline:none;width:18px;height:18px;" />
                        </td>
                        <td
                            style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#FFFFFF;line-height:20px;padding:1px 0;vertical-align:middle;">
                            <a href="tel:+18444437584,,102"
                                style="color:#FFFFFF;text-decoration:none;">844-443-7584 x102</a>
                        </td>
                    </tr>
                    <tr>
                        <td width="18" style="padding:1px 8px 1px 0;vertical-align:middle;">
                            <img src="https://chife-mod.github.io/Eplug_Gmail_Signature/public/assets/images/icon-email.png"
                                alt="" width="18" height="18"
                                style="display:block;border:0;outline:none;width:18px;height:18px;" />
                        </td>
                        <td
                            style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#FFFFFF;line-height:20px;padding:1px 0;vertical-align:middle;">
                            <a href="mailto:michael@eplug.com"
                                style="color:#FFFFFF;text-decoration:none;">michael@eplug.com</a>
                        </td>
                    </tr>
                    <tr>
                        <td width="18" style="padding:1px 8px 1px 0;vertical-align:middle;">
                            <img src="https://chife-mod.github.io/Eplug_Gmail_Signature/public/assets/images/icon-linkedin.png"
                                alt="" width="18" height="18"
                                style="display:block;border:0;outline:none;width:18px;height:18px;" />
                        </td>
                        <td
                            style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#FFFFFF;line-height:20px;padding:1px 0;vertical-align:middle;">
                            <a href="https://www.linkedin.com/in/michael-y-elhav-781759113/"
                                style="color:#FFFFFF;text-decoration:none;">LinkedIn</a>
                        </td>
                    </tr>
                </table>
            </td>
            <!-- 4px GAP -->
            <td width="4" style="width:4px;font-size:0;line-height:0;">&nbsp;</td>
            <!-- RIGHT: EPlug + Energy Plus logos stacked -->
            <td width="174" valign="top"
                style="width:174px;vertical-align:top;padding:0;height:100%;">
                <table cellpadding="0" cellspacing="0" border="0" role="presentation"
                    style="border-collapse:collapse;width:174px;height:100%;">
                    <!-- EPlug block -->
                    <tr>
                        <td bgcolor="#FF00C5" align="center" valign="middle"
                            style="background-color:#FF00C5;padding:20px 16px;text-align:center;vertical-align:middle;">
                            <a href="https://eplug.com" style="text-decoration:none;border:0;color:#FFFFFF;">
                                <img src="https://chife-mod.github.io/Eplug_Gmail_Signature/public/assets/images/eplug-logo-v2.png"
                                    alt="EPlug" width="142" height="52"
                                    style="display:block;border:0;outline:none;width:142px;height:52px;margin:0 auto 8px auto;" />
                                <span
                                    style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#FFFFFF;line-height:18px;text-decoration:none;">eplug.com</span>
                            </a>
                        </td>
                    </tr>
                    <!-- 4px gap -->
                    <tr>
                        <td height="4" style="height:4px;font-size:0;line-height:0;">&nbsp;</td>
                    </tr>
                    <!-- Energy Plus block -->
                    <tr>
                        <td bgcolor="#1C4523" align="center" valign="middle"
                            style="background-color:#1C4523;padding:20px 16px;text-align:center;vertical-align:middle;">
                            <a href="https://energyplusny.com" style="text-decoration:none;border:0;color:#FFFFFF;">
                                <img src="https://chife-mod.github.io/Eplug_Gmail_Signature/public/assets/images/energyplus-logo.png"
                                    alt="Energy Plus" width="121" height="43"
                                    style="display:block;border:0;outline:none;width:121px;height:43px;margin:0 auto 8px auto;" />
                                <span
                                    style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#FFFFFF;line-height:18px;text-decoration:none;">energyplusny.com</span>
                            </a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    <!-- EMAIL SIGNATURE END -->

</body>

</html>

  phone, websites and LinkedIn only, with both brand logos stacked on the right.

  INSTALL: Open in Chrome -> Cmd+A -> Cmd+C -> Gmail Settings -> Signature -> Cmd+V -> Save

  Column arithmetic: 24 + 219 + 24 + 1 + 24 + 130 + 24 = 446.
  The 1px column is the vertical rule; it belongs to the #FDFDFD panel, so its
  cell carries that background while the rule itself spans only rows 24..186.

  The two logos plus the hairline between them ship as ONE image: they are a
  fixed lockup, and a table build-out of the rule would cost markup budget for
  no editing benefit. Icons are reused from sig-ep/ — byte-identical component.
-->
